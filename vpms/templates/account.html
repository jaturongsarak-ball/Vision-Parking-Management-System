{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>แก้ไขข้อมูล</h2>
    <div class="card-body mt-5">
        <form id="register_form" onsubmit="handle_register(event)">
            <div class="mb-3">
                <label for="role_name" class="form-label">สิทธิ์:</label>
                <input type="text" id="role_name" name="role_name" class="form-control" value="{{ role_name }}" disabled>
            </div>
            <div class="mb-3">
                <label for="username" class="form-label">ชื่อผู้ใช้งาน:</label>
                <input type="text" id="username" name="username" class="form-control" value="{{ username }}" disabled>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">รหัสผ่านใหม่:</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">ยืนยันรหัสผ่าน:</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">บันทึก</button>
        </form>
        <div id="error_message" class="alert alert-danger d-none mt-3 alert-dismissible fade show" role="alert">
            <span id="error_text"></span>
            <button type="button" class="btn-close" aria-label="Close" onclick="closeError()"></button>
        </div>
        <div id="success_message" class="alert alert-success d-none mt-3 alert-dismissible fade show" role="alert">
            <span id="success_text"></span> <!-- ใช้ span นี้เพื่อแสดงข้อความจาก API -->
            <button type="button" class="btn-close" aria-label="Close" onclick="closeSuccess()"></button>
        </div>
    </div>
</div>

<script>
    async function handle_register(event) {
        event.preventDefault();

        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        const error_message = document.getElementById('error_message');
        const success_message = document.getElementById('success_message');
        const error_text = document.getElementById('error_text');
        const success_text = document.getElementById('success_text'); // เพิ่มตัวแปรสำหรับข้อความสำเร็จ

        error_message.classList.add('d-none');
        success_message.classList.add('d-none');
        error_text.textContent = '';

        showLoading();

        if (password.trim() === '' || confirm_password.trim() === '') {
            error_text.textContent = 'กรุณากรอกข้อมูลให้ครบถ้วน';
            error_message.classList.remove('d-none');
            hideLoading();
            return;
        }

        if (password !== confirm_password) {
            error_text.textContent = 'รหัสผ่านไม่ตรงกัน';
            error_message.classList.remove('d-none');
            hideLoading();
            return;
        }

        try {
            const response = await fetch('/account/edit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ password }),
            });

            const response_json = await response.json();

            hideLoading();

            if (response_json.status === 'error') {
                error_text.textContent = response_json.message;
                error_message.classList.remove('d-none');
                return;
            }

            // ถ้าการสมัครสมาชิกสำเร็จ ให้ใช้ข้อความจาก API
            success_text.textContent = response_json.message; // ใช้ข้อความที่ได้รับจาก API
            success_message.classList.remove('d-none');
        } catch (error) {
            console.error('Error:', error);
            error_text.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์';
            error_message.classList.remove('d-none');
        }
    }

    function closeError() {
        const error_message = document.getElementById('error_message');
        error_message.classList.add('d-none');
    }

    function closeSuccess() {
        const success_message = document.getElementById('success_message');
        success_message.classList.add('d-none');
    }
</script>

{% endblock %}
